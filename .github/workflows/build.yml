name: Build ConnectHub Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 websockets pyinstaller

    - name: Build Client (PyInstaller)
      run: pyinstaller --noconfirm --clean client/app.py --name ConnectHub-Client --windowed --add-data "protocol;protocol" --add-data "version.json;." --add-data "client/config.json;." --hidden-import websockets --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui --hidden-import PyQt5.QtWidgets

    - name: Build Server (PyInstaller)
      run: pyinstaller --noconfirm --clean server/main.py --name ConnectHub-Server --console --add-data "protocol;protocol" --add-data "version.json;." --add-data "server/config.json;." --hidden-import websockets

    - name: Create server data directory
      run: mkdir dist\ConnectHub-Server\data

    - name: Find and install NSIS
      shell: pwsh
      run: |
        # Try common paths first
        $paths = @(
          "C:\Program Files (x86)\NSIS\makensis.exe",
          "C:\Program Files\NSIS\makensis.exe",
          "C:\ProgramData\chocolatey\bin\makensis.exe"
        )
        foreach ($p in $paths) {
          if (Test-Path $p) {
            Write-Host "Found NSIS at: $p"
            exit 0
          }
        }
        # If not found, install via choco
        Write-Host "NSIS not found, installing via choco..."
        choco install nsis -y --no-progress 2>&1 | Out-Null
        # Update path
        $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH","User")
        if (Get-Command makensis -ErrorAction SilentlyContinue) {
          Write-Host "NSIS installed successfully"
        } else {
          Write-Host "NSIS still not found - will try portable version"
          choco install nsis.portable -y --no-progress 2>&1 | Out-Null
        }

    - name: Build Setup (NSIS installer)
      shell: cmd
      run: |
        set PATH=%PATH%;C:\Program Files (x86)\NSIS;C:\Program Files\NSIS
        makensis installer\installer.nsi

    - name: Verify installer
      run: dir ConnectHub-Setup.exe

    - name: Create Release and upload installer
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ github.ref_name }}"
        $notes = "ConnectHub " + $tag + "`n`nDownload ConnectHub-Setup.exe and double-click to install.`n`n- Client: Chat / File transfer / Remote desktop`n- Server: Run on one computer only"
        gh release create $tag --title ("ConnectHub " + $tag) --notes $notes 'ConnectHub-Setup.exe#ConnectHub Installer (double-click to install)'

    - name: Upload additional archives (client zip + server zip)
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        Compress-Archive -Path "dist\ConnectHub-Client\*" -DestinationPath "ConnectHub-Client.zip"
        Compress-Archive -Path "dist\ConnectHub-Server\*" -DestinationPath "ConnectHub-Server.zip"
        gh release upload "${{ github.ref_name }}" "ConnectHub-Client.zip#ConnectHub Client (portable)" "ConnectHub-Server.zip#ConnectHub Server (portable)"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ConnectHub-Setup
        path: ConnectHub-Setup.exe
