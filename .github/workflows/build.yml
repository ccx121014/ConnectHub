name: Build ConnectHub Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        shell: pwsh
        run: pip install --upgrade pip PyQt5 websockets pyinstaller

      - name: Build Client
        shell: pwsh
        run: pyinstaller --noconfirm --clean client/app.py --name ConnectHub-Client --windowed --add-data "protocol;protocol" --add-data "version.json;." --add-data "client/config.json;." --hidden-import websockets --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui --hidden-import PyQt5.QtWidgets

      - name: Build Server
        shell: pwsh
        run: pyinstaller --noconfirm --clean server/main.py --name ConnectHub-Server --console --add-data "protocol;protocol" --add-data "version.json;." --add-data "server/config.json;." --hidden-import websockets

      - name: Verify build output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist\ConnectHub-Server\data" -Force
          Get-ChildItem dist -Recurse -Depth 1 | Format-Table

      - name: Build installer with InnoSetup
        shell: pwsh
        continue-on-error: true
        run: |
          choco install innosetup -y --no-progress
          $iscc = Get-ChildItem -Path "C:\Program Files (x86)\Inno Setup 6","C:\Program Files\Inno Setup 6" -Filter "iscc.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $iscc) {
            Write-Host "iscc not found, trying other paths"
            Get-ChildItem -Path "C:\" -Filter "iscc.exe" -Recurse -ErrorAction SilentlyContinue -Depth 5 | Select-Object -First 3 -ExpandProperty FullName
            exit 0
          }
          Write-Host "Using iscc at $iscc"
          & $iscc installer\setup.iss
          $exitCode = $LASTEXITCODE
          Write-Host "iscc exit code $exitCode"
          if (Test-Path "ConnectHub-Setup.exe") {
            Write-Host "SUCCESS installer built"
            Get-Item ConnectHub-Setup.exe | Select-Object Name, Length
          } else {
            Write-Host "No installer found in working dir"
            $outputDir = Get-ChildItem -Path "." -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "*Setup*" -or $_.Name -like "*installer*" } | Select-Object -First 5
            foreach ($f in $outputDir) { Write-Host $f.FullName }
          }

      - name: Build installer with NSIS as backup
        shell: pwsh
        continue-on-error: true
        run: |
          if (Test-Path "ConnectHub-Setup.exe") {
            Write-Host "Installer already exists, skipping NSIS"
            exit 0
          }
          choco install nsis -y --no-progress
          $makensis = Get-ChildItem -Path "C:\Program Files (x86)\NSIS","C:\Program Files\NSIS" -Filter "makensis.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $makensis) { exit 0 }
          Write-Host "Using makensis at $makensis"
          & $makensis installer\installer.nsi
          if (Test-Path "ConnectHub-Setup.exe") {
            Write-Host "NSIS installer built"
          }

      - name: Create release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          Write-Host "Tag is $tag"

          Compress-Archive -Path "dist\ConnectHub-Client\*" -DestinationPath "ConnectHub-Client.zip" -Force
          Compress-Archive -Path "dist\ConnectHub-Server\*" -DestinationPath "ConnectHub-Server.zip" -Force

          Write-Host "Files for release:"
          Get-ChildItem *.zip, *.exe | Format-Table Name, Length

          $fileArgs = @()
          if (Test-Path "ConnectHub-Setup.exe") {
            $fileArgs += "ConnectHub-Setup.exe"
          }
          $fileArgs += "ConnectHub-Client.zip"
          $fileArgs += "ConnectHub-Server.zip"

          Write-Host "Creating release with files: $($fileArgs -join ', ')"
          & gh release create $tag @fileArgs --title "ConnectHub $tag" --notes "ConnectHub $tag - download and run"
          Write-Host "gh exit code $LASTEXITCODE"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ConnectHub-Packages
          path: |
            ConnectHub-Client.zip
            ConnectHub-Server.zip
            ConnectHub-Setup.exe
          if-no-files-found: warn
