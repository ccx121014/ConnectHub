name: Build ConnectHub Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 websockets pyinstaller

    - name: Build Client with PyInstaller
      shell: pwsh
      run: pyinstaller --noconfirm --clean client/app.py --name ConnectHub-Client --windowed --add-data "protocol;protocol" --add-data "version.json;." --add-data "client/config.json;." --hidden-import websockets --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui --hidden-import PyQt5.QtWidgets

    - name: Build Server with PyInstaller
      shell: pwsh
      run: pyinstaller --noconfirm --clean server/main.py --name ConnectHub-Server --console --add-data "protocol;protocol" --add-data "version.json;." --add-data "server/config.json;." --hidden-import websockets

    - name: Prepare output directories
      shell: pwsh
      run: |
        if (-not (Test-Path "dist\ConnectHub-Server\data")) {
          New-Item -ItemType Directory -Path "dist\ConnectHub-Server\data" -Force
        }
        Write-Host "Build output:"
        Get-ChildItem dist

    - name: Install NSIS
      shell: pwsh
      run: choco install nsis -y --no-progress

    - name: Build NSIS installer
      shell: pwsh
      run: |
        $env:PATH = "C:\Program Files (x86)\NSIS;C:\Program Files\NSIS;C:\ProgramData\chocolatey\bin;" + $env:PATH
        & makensis installer\installer.nsi
        if (Test-Path ConnectHub-Setup.exe) {
          Write-Host "SUCCESS: ConnectHub-Setup.exe created"
        } else {
          Write-Host "ERROR: ConnectHub-Setup.exe not found"
          exit 1
        }

    - name: Release artifacts
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ github.ref_name }}"

        # Build ZIP packages
        Compress-Archive -Path "dist\ConnectHub-Client\*" -DestinationPath "ConnectHub-Client.zip"
        Compress-Archive -Path "dist\ConnectHub-Server\*" -DestinationPath "ConnectHub-Server.zip"

        # Create release with all files
        $notes = "ConnectHub " + $tag + "`n`n- ConnectHub-Setup.exe: Double-click to install (recommended)`n- ConnectHub-Client.zip: Client (portable)`n- ConnectHub-Server.zip: Server (portable)"
        gh release create $tag --title ("ConnectHub " + $tag) --notes $notes `
          'ConnectHub-Setup.exe#ConnectHub Installer (double-click to install)' `
          'ConnectHub-Client.zip#ConnectHub Client (portable)' `
          'ConnectHub-Server.zip#ConnectHub Server (portable)'

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ConnectHub-Setup
        path: ConnectHub-Setup.exe
