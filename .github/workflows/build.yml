name: Build ConnectHub Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 websockets pyinstaller

    - name: Build Client (PyInstaller)
      run: |
        pyinstaller --noconfirm --clean client/app.py --name ConnectHub-Client --windowed --add-data "protocol;protocol" --add-data "version.json;." --add-data "client/config.json;." --hidden-import websockets --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui --hidden-import PyQt5.QtWidgets

    - name: Build Server (PyInstaller)
      run: |
        pyinstaller --noconfirm --clean server/main.py --name ConnectHub-Server --console --add-data "protocol;protocol" --add-data "version.json;." --add-data "server/config.json;." --hidden-import websockets

    - name: Create server data directory
      run: mkdir dist\ConnectHub-Server\data

    - name: Install NSIS
      run: choco install nsis.portable -y --no-progress

    - name: Build Setup (NSIS installer)
      run: makensis installer\installer.nsi

    - name: Verify installer
      run: |
        dir ConnectHub-Setup.exe
        dir dist\ConnectHub-Client\ConnectHub-Client.exe
        dir dist\ConnectHub-Server\ConnectHub-Server.exe

    - name: Delete old release
      run: gh release delete "${{ github.ref_name }}" -y 2>&1 | Out-Null; $LASTEXITCODE = 0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Create Release
      run: gh release create "${{ github.ref_name }}" --title "ConnectHub ${{ github.ref_name }}" --notes "ConnectHub ${{ github.ref_name }}: 即时聊天、文件传输、远程桌面。下载 ConnectHub-Setup.exe 双击安装即可。"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload installer to Release
      run: gh release upload "${{ github.ref_name }}" "ConnectHub-Setup.exe" --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload additional artifacts (client zip + server zip)
      run: |
        Compress-Archive -Path "dist\ConnectHub-Client\*" -DestinationPath "ConnectHub-Client.zip"
        Compress-Archive -Path "dist\ConnectHub-Server\*" -DestinationPath "ConnectHub-Server.zip"
        gh release upload "${{ github.ref_name }}" "ConnectHub-Client.zip" "ConnectHub-Server.zip" --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build artifacts (for debugging)
      uses: actions/upload-artifact@v4
      with:
        name: ConnectHub-Setup
        path: ConnectHub-Setup.exe
