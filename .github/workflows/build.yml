name: Build ConnectHub Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 websockets pyinstaller

    - name: Build Client (PyInstaller)
      run: pyinstaller --noconfirm --clean client/app.py --name ConnectHub-Client --windowed --add-data "protocol;protocol" --add-data "version.json;." --add-data "client/config.json;." --hidden-import websockets --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui --hidden-import PyQt5.QtWidgets

    - name: Build Server (PyInstaller)
      run: pyinstaller --noconfirm --clean server/main.py --name ConnectHub-Server --console --add-data "protocol;protocol" --add-data "version.json;." --add-data "server/config.json;." --hidden-import websockets

    - name: Create server data directory
      run: mkdir dist\ConnectHub-Server\data

    - name: List build output
      run: dir dist

    - name: Install NSIS
      run: choco install nsis -y --no-progress

    - name: Verify NSIS
      run: makensis /VERSION

    - name: Build Setup (NSIS installer)
      run: makensis installer\installer.nsi
      working-directory: ${{ github.workspace }}

    - name: Verify installer
      run: dir ConnectHub-Setup.exe

    - name: Create Release and upload installer
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ github.ref_name }}"
        $notes = "ConnectHub " + $tag + "`n`n下载 ConnectHub-Setup.exe 后双击即可安装。`n`n- 客户端: 聊天 / 文件传输 / 远程桌面`n- 服务器: 只需在一台电脑上运行"
        & gh release create $tag --title ("ConnectHub " + $tag) --notes $notes --repo "${{ github.repository }}" 'ConnectHub-Setup.exe#ConnectHub 安装包 (双击安装)'
        if ($LASTEXITCODE -ne 0) {
          Write-Host "Release creation failed with exit code $LASTEXITCODE - trying with GitHub API"
        }

    - name: Upload additional archives (client zip + server zip)
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        Compress-Archive -Path "dist\ConnectHub-Client\*" -DestinationPath "ConnectHub-Client.zip"
        Compress-Archive -Path "dist\ConnectHub-Server\*" -DestinationPath "ConnectHub-Server.zip"
        & gh release upload "${{ github.ref_name }}" "ConnectHub-Client.zip#ConnectHub 客户端 (免安装版)" "ConnectHub-Server.zip#ConnectHub 服务器 (免安装版)" --repo "${{ github.repository }}"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ConnectHub-Setup
        path: ConnectHub-Setup.exe
