name: Build ConnectHub Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps + UPX
        shell: pwsh
        run: |
          pip install --upgrade pip websockets pyinstaller
          $upxUrl = "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip"
          Invoke-WebRequest -Uri $upxUrl -OutFile "$env:TEMP\upx.zip" -UseBasicParsing
          Expand-Archive -Path "$env:TEMP\upx.zip" -DestinationPath "$env:TEMP" -Force
          $upxDir = Get-ChildItem "$env:TEMP" -Directory | Where-Object { $_.Name -like "upx*" } | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "UPX directory: $upxDir"
          echo "UPX_DIR=$upxDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "$upxDir\upx.exe" --version

      - name: Build Client (PyInstaller -OO onedir + ultra-exclude)
        shell: pwsh
        run: |
          # -OO strips docstrings & asserts from bytecode -> smaller .pyc payload
          # --onedir: produces a folder (better per-file UPX + InnoSetup solid LZMA2)
          # No --upx-dir: PyInstaller won't UPX; we do it manually with ultra-brute below
          python -OO -m PyInstaller --noconfirm --clean `
            --onedir --windowed --strip `
            --paths . --paths client `
            --add-data "protocol;protocol" `
            --add-data "version.json;." `
            --add-data "client/config.json;." `
            --hidden-import websockets --hidden-import websocket_client `
            --hidden-import main_window --hidden-import chat_widget `
            --hidden-import contact_list --hidden-import file_transfer `
            --hidden-import login_dialog --hidden-import updater `
            --hidden-import protocol.messages --hidden-import protocol.signals `
            --hidden-import protocol --hidden-import _tkinter `
            --exclude-module PyQt5 --exclude-module PyQt5.QtCore `
            --exclude-module PyQt5.QtGui --exclude-module PyQt5.QtWidgets `
            --exclude-module PyQt5.QtNetwork `
            --exclude-module PIL --exclude-module Pillow `
            --exclude-module numpy --exclude-module scipy `
            --exclude-module matplotlib --exclude-module pandas `
            --exclude-module unittest --exclude-module test `
            --exclude-module pydoc --exclude-module pydoc_data `
            --exclude-module idlelib --exclude-module lib2to3 `
            --exclude-module distutils --exclude-module setuptools `
            --exclude-module ensurepip --exclude-module tkinter.tix `
            --exclude-module turtledemo --exclude-module turtle `
            --exclude-module sqlite3 --exclude-module bdb `
            --exclude-module audioop --exclude-module wave `
            --exclude-module smtpd --exclude-module poplib `
            --exclude-module imaplib --exclude-module mailbox `
            --exclude-module crypt --exclude-module msilib `
            --exclude-module unicodedata --exclude-module pyexpat `
            --exclude-module xml --exclude-module xml.dom `
            --exclude-module xml.etree --exclude-module xml.parsers `
            --exclude-module xml.sax --exclude-module email `
            --exclude-module http.server --exclude-module http.cookiejar `
            --exclude-module http.cookies `
            --exclude-module ftplib --exclude-module telnetlib `
            --exclude-module nntplib --exclude-module xmlrpc `
            --exclude-module tkinter.scrolledtext --exclude-module tkinter.dnd `
            --exclude-module tkinter.dialog `
            --exclude-module tkinter.colorchooser --exclude-module tkinter.simpledialog `
            --exclude-module csv --exclude-module difflib `
            --exclude-module pprint --exclude-module tabnanny `
            --exclude-module stringprep --exclude-module compileall `
            --exclude-module multiprocessing `
            --exclude-module fractions --exclude-module statistics `
            --exclude-module numbers --exclude-module pdb `
            --exclude-module profile --exclude-module pstats `
            --exclude-module netrc --exclude-module getpass `
            --exclude-module mimetypes --exclude-module plistlib `
            --exclude-module reprlib --exclude-module shlex `
            --exclude-module code `
            --exclude-module codeop --exclude-module textwrap `
            --exclude-module ast --exclude-module dis `
            --exclude-module pickletools --exclude-module shelve `
            --exclude-module socketserver --exclude-module tty `
            --exclude-module quopri --exclude-module uu `
            --exclude-module binhex --exclude-module xdrlib `
            --exclude-module cmd --exclude-module trace `
            --exclude-module tracemalloc --exclude-module cProfile `
            --exclude-module asyncore --exclude-module asynchat `
            --exclude-module sunau --exclude-module aifc `
            --exclude-module chunk --exclude-module colorsys `
            --exclude-module wsgiref --exclude-module zoneinfo `
            --exclude-module rlcompleter --exclude-module readline `
            --exclude-module py_compile --exclude-module modulefinder `
            --exclude-module symtable --exclude-module token `
            --exclude-module tokenize `
            --exclude-module bisect --exclude-module calendar `
            --exclude-module configparser --exclude-module getopt `
            --exclude-module argparse --exclude-module platform `
            --exclude-module sysconfig --exclude-module pkgutil `
            --exclude-module importlib.machinery --exclude-module importlib.util `
            --exclude-module ssl --exclude-module _ssl `
            --exclude-module encodings.big5 --exclude-module encodings.big5hkscs `
            --exclude-module encodings.cp932 --exclude-module encodings.cp949 `
            --exclude-module encodings.cp950 --exclude-module encodings.euc_jis_2004 `
            --exclude-module encodings.euc_jisx0213 --exclude-module encodings.euc_jp `
            --exclude-module encodings.euc_kr --exclude-module encodings.gb18030 `
            --exclude-module encodings.gb2312 --exclude-module encodings.gbk `
            --exclude-module encodings.hz --exclude-module encodings.iso2022_jp `
            --exclude-module encodings.iso2022_jp_1 --exclude-module encodings.iso2022_jp_2 `
            --exclude-module encodings.iso2022_jp_2004 --exclude-module encodings.iso2022_jp_3 `
            --exclude-module encodings.iso2022_jp_ext --exclude-module encodings.iso2022_kr `
            --exclude-module encodings.iso8859_2 --exclude-module encodings.iso8859_3 `
            --exclude-module encodings.iso8859_4 --exclude-module encodings.iso8859_5 `
            --exclude-module encodings.iso8859_6 --exclude-module encodings.iso8859_7 `
            --exclude-module encodings.iso8859_8 --exclude-module encodings.iso8859_9 `
            --exclude-module encodings.iso8859_10 --exclude-module encodings.iso8859_11 `
            --exclude-module encodings.iso8859_13 --exclude-module encodings.iso8859_14 `
            --exclude-module encodings.iso8859_15 --exclude-module encodings.iso8859_16 `
            --exclude-module encodings.johab --exclude-module encodings.koi8_r `
            --exclude-module encodings.koi8_t --exclude-module encodings.koi8_u `
            --exclude-module encodings.mac_cyrillic --exclude-module encodings.mac_greek `
            --exclude-module encodings.mac_iceland --exclude-module encodings.mac_latin2 `
            --exclude-module encodings.mac_roman --exclude-module encodings.mac_turkish `
            --exclude-module encodings.ptcp154 --exclude-module encodings.shift_jis `
            --exclude-module encodings.shift_jis_2004 --exclude-module encodings.shift_jisx0213 `
            --name ConnectHub-Client `
            client/app.py
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Client build FAILED"
            exit 1
          }
          # UPX --ultra-brute on every .dll/.pyd in the onedir folder.
          # Files are uncompressed (no --upx-dir above), so UPX compresses from scratch.
          # Reset $LASTEXITCODE after loop — UPX may return non-zero for files it can't shrink.
          $upxExe = "$env:UPX_DIR\upx.exe"
          Get-ChildItem -Path "dist\ConnectHub-Client" -Recurse -Include "*.dll","*.pyd" | ForEach-Object {
            $before = $_.Length
            & $upxExe --ultra-brute --force $_.FullName 2>&1 | Out-Null
            $after = (Get-Item $_.FullName).Length
            $pct = if ($before -gt 0) { [math]::Round((1 - $after/$before) * 100, 1) } else { 0 }
            Write-Host "  UPX: $($_.Name)  $([math]::Round($before/1KB))KB -> $([math]::Round($after/1KB))KB (-$pct%)"
          }
          $LASTEXITCODE = 0
          $clientSize = [math]::Round((Get-ChildItem -Path "dist\ConnectHub-Client" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 2)
          Write-Host "Client folder total: $clientSize MB"

          # --- 清理 tk/tcl 非必要数据文件 ---
          Write-Host "`nCleaning tk/tcl data files..."
          $tclDirs = Get-ChildItem -Path "dist\ConnectHub-Client\_internal" -Recurse -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "^(tcl|tk|_tcl|_tk)" }
          foreach ($dir in $tclDirs) {
            # 删除 demos 目录
            Get-ChildItem -Path $dir.FullName -Recurse -Directory -Filter "demos" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
            # 删除非英文消息文件
            if (Test-Path "$($dir.FullName)\msgs") {
              Get-ChildItem -Path "$($dir.FullName)\msgs" -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch "^en" } | Remove-Item -Force -ErrorAction SilentlyContinue
            }
            # 删除示例图片
            Get-ChildItem -Path $dir.FullName -Recurse -File -Include "*.gif","*.png" -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "logo|pwrd|flag|teapot|nose|ouster" } | Remove-Item -Force -ErrorAction SilentlyContinue
            # 删除 tcl encoding/ 中除核心编码外的文件
            if (Test-Path "$($dir.FullName)\encoding") {
              $keepEnc = @("ascii.enc","cp1252.enc","cp936.enc","iso8859-1.enc","utf-8.enc")
              Get-ChildItem -Path "$($dir.FullName)\encoding" -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -notin $keepEnc } | Remove-Item -Force -ErrorAction SilentlyContinue
            }
            # 删除 http1.0 和 opt0.4 目录
            Get-ChildItem -Path $dir.FullName -Recurse -Directory -Filter "http1.0" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
            Get-ChildItem -Path $dir.FullName -Recurse -Directory -Filter "opt0.4" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }
          # 删除 _internal 中已知的测试/示例文件
          Get-ChildItem -Path "dist\ConnectHub-Client\_internal" -Recurse -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "^test_|_test\.py$|test_.*\.py$" } | Remove-Item -Force -ErrorAction SilentlyContinue

          # --- 删除 OpenSSL DLL（已用 WinHTTP 替代，不再需要）---
          Write-Host "`nRemoving OpenSSL DLLs (replaced by WinHTTP)..."
          foreach ($dll in @("libcrypto-3.dll","libssl-3.dll","libcrypto-3-x64.dll","libssl-3-x64.dll")) {
            $p = "dist\ConnectHub-Client\_internal\$dll"
            if (Test-Path $p) {
              Remove-Item $p -Force
              Write-Host "  Removed $dll"
            }
          }

          # --- 文件大小分析 ---
          Write-Host "`n=== Top 20 largest files in _internal ==="
          Get-ChildItem -Path "dist\ConnectHub-Client\_internal" -Recurse -File -ErrorAction SilentlyContinue | Sort-Object Length -Descending | Select-Object -First 20 | ForEach-Object { $mb = [math]::Round($_.Length / 1MB, 2); Write-Host "  $($_.Name): $mb MB" }
          Write-Host "`n=== Directory sizes in _internal ==="
          Get-ChildItem -Path "dist\ConnectHub-Client\_internal" -Directory -ErrorAction SilentlyContinue | ForEach-Object { $size = (Get-ChildItem -Path $_.FullName -Recurse -File | Measure-Object -Property Length -Sum).Sum; $mb = [math]::Round($size / 1MB, 2); Write-Host "  $($_.Name): $mb MB" }
          # _tcl_data / _tk_data 详细分析
          Write-Host "`n=== _tcl_data / _tk_data / tcl8 subdir sizes ==="
          Get-ChildItem -Path "dist\ConnectHub-Client\_internal" -Recurse -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "^(tcl|tk|_tk_data|_tcl_data)" } | ForEach-Object { $size = (Get-ChildItem -Path $_.FullName -Recurse -File | Measure-Object -Property Length -Sum).Sum; $mb = [math]::Round($size / 1MB, 2); Write-Host "  $($_.FullName.Replace('dist\ConnectHub-Client\_internal\','')): $mb MB" }

          $clientSizeAfter = [math]::Round((Get-ChildItem -Path "dist\ConnectHub-Client" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 2)
          Write-Host "Client folder after cleanup: $clientSizeAfter MB"

      - name: Build Server (onedir + UPX ultra-brute)
        shell: pwsh
        run: |
          python -OO -m PyInstaller --noconfirm --clean `
            --onedir --console --strip `
            --paths . --paths server `
            --add-data "protocol;protocol" `
            --add-data "version.json;." `
            --add-data "server/config.json;." `
            --hidden-import websockets --hidden-import user_manager `
            --hidden-import chat_history --hidden-import webrtc_signaling `
            --hidden-import protocol --hidden-import protocol.messages `
            --exclude-module PyQt5 --exclude-module PyQt5.QtCore `
            --exclude-module PyQt5.QtGui --exclude-module PyQt5.QtWidgets `
            --exclude-module PyQt5.QtNetwork `
            --exclude-module PIL --exclude-module numpy `
            --exclude-module scipy --exclude-module matplotlib `
            --exclude-module pandas --exclude-module unittest `
            --exclude-module test --exclude-module pydoc `
            --exclude-module idlelib --exclude-module lib2to3 `
            --exclude-module distutils --exclude-module setuptools `
            --exclude-module unicodedata --exclude-module pyexpat `
            --exclude-module xml --exclude-module email `
            --exclude-module ast --exclude-module dis `
            --exclude-module pickletools --exclude-module shelve `
            --exclude-module socketserver --exclude-module tty `
            --exclude-module quopri --exclude-module uu `
            --exclude-module binhex --exclude-module xdrlib `
            --exclude-module cmd --exclude-module trace `
            --exclude-module tracemalloc --exclude-module cProfile `
            --exclude-module asyncore --exclude-module asynchat `
            --exclude-module sunau --exclude-module aifc `
            --exclude-module chunk --exclude-module colorsys `
            --exclude-module wsgiref --exclude-module zoneinfo `
            --exclude-module rlcompleter --exclude-module readline `
            --exclude-module py_compile --exclude-module modulefinder `
            --exclude-module symtable --exclude-module token `
            --exclude-module tokenize `
            --exclude-module bisect --exclude-module calendar `
            --exclude-module configparser --exclude-module getopt `
            --exclude-module argparse --exclude-module platform `
            --exclude-module sysconfig --exclude-module pkgutil `
            --exclude-module importlib.machinery --exclude-module importlib.util `
            --exclude-module ssl --exclude-module _ssl `
            --exclude-module encodings.big5 --exclude-module encodings.big5hkscs `
            --exclude-module encodings.cp932 --exclude-module encodings.cp949 `
            --exclude-module encodings.cp950 --exclude-module encodings.euc_jis_2004 `
            --exclude-module encodings.euc_jisx0213 --exclude-module encodings.euc_jp `
            --exclude-module encodings.euc_kr --exclude-module encodings.gb18030 `
            --exclude-module encodings.gb2312 --exclude-module encodings.gbk `
            --exclude-module encodings.hz --exclude-module encodings.iso2022_jp `
            --exclude-module encodings.iso2022_jp_1 --exclude-module encodings.iso2022_jp_2 `
            --exclude-module encodings.iso2022_jp_2004 --exclude-module encodings.iso2022_jp_3 `
            --exclude-module encodings.iso2022_jp_ext --exclude-module encodings.iso2022_kr `
            --exclude-module encodings.iso8859_2 --exclude-module encodings.iso8859_3 `
            --exclude-module encodings.iso8859_4 --exclude-module encodings.iso8859_5 `
            --exclude-module encodings.iso8859_6 --exclude-module encodings.iso8859_7 `
            --exclude-module encodings.iso8859_8 --exclude-module encodings.iso8859_9 `
            --exclude-module encodings.iso8859_10 --exclude-module encodings.iso8859_11 `
            --exclude-module encodings.iso8859_13 --exclude-module encodings.iso8859_14 `
            --exclude-module encodings.iso8859_15 --exclude-module encodings.iso8859_16 `
            --exclude-module encodings.johab --exclude-module encodings.koi8_r `
            --exclude-module encodings.koi8_t --exclude-module encodings.koi8_u `
            --exclude-module encodings.mac_cyrillic --exclude-module encodings.mac_greek `
            --exclude-module encodings.mac_iceland --exclude-module encodings.mac_latin2 `
            --exclude-module encodings.mac_roman --exclude-module encodings.mac_turkish `
            --exclude-module encodings.ptcp154 --exclude-module encodings.shift_jis `
            --exclude-module encodings.shift_jis_2004 --exclude-module encodings.shift_jisx0213 `
            --name ConnectHub-Server `
            server/main.py
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Server build FAILED"
            exit 1
          }
          $upxExe = "$env:UPX_DIR\upx.exe"
          Get-ChildItem -Path "dist\ConnectHub-Server" -Recurse -Include "*.dll","*.pyd" | ForEach-Object {
            $before = $_.Length
            & $upxExe --ultra-brute --force $_.FullName 2>&1 | Out-Null
            $after = (Get-Item $_.FullName).Length
            $pct = if ($before -gt 0) { [math]::Round((1 - $after/$before) * 100, 1) } else { 0 }
            Write-Host "  UPX: $($_.Name)  $([math]::Round($before/1KB))KB -> $([math]::Round($after/1KB))KB (-$pct%)"
          }
          $LASTEXITCODE = 0
          $serverSize = [math]::Round((Get-ChildItem -Path "dist\ConnectHub-Server" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 2)
          Write-Host "Server folder total: $serverSize MB"

          # --- 清理 tk/tcl 非必要数据文件 (server 不依赖 tkinter，但 PyInstaller 可能仍包含) ---
          Write-Host "`nCleaning tk/tcl data files for server..."
          $tclDirs = Get-ChildItem -Path "dist\ConnectHub-Server\_internal" -Recurse -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "^(tcl|tk|_tcl|_tk)" }
          foreach ($dir in $tclDirs) {
            Get-ChildItem -Path $dir.FullName -Recurse -Directory -Filter "demos" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
            if (Test-Path "$($dir.FullName)\msgs") {
              Get-ChildItem -Path "$($dir.FullName)\msgs" -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch "^en" } | Remove-Item -Force -ErrorAction SilentlyContinue
            }
            Get-ChildItem -Path $dir.FullName -Recurse -File -Include "*.gif","*.png" -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "logo|pwrd|flag|teapot|nose|ouster" } | Remove-Item -Force -ErrorAction SilentlyContinue
            if (Test-Path "$($dir.FullName)\encoding") {
              $keepEnc = @("ascii.enc","cp1252.enc","cp936.enc","iso8859-1.enc","utf-8.enc")
              Get-ChildItem -Path "$($dir.FullName)\encoding" -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -notin $keepEnc } | Remove-Item -Force -ErrorAction SilentlyContinue
            }
            Get-ChildItem -Path $dir.FullName -Recurse -Directory -Filter "http1.0" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
            Get-ChildItem -Path $dir.FullName -Recurse -Directory -Filter "opt0.4" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }
          Get-ChildItem -Path "dist\ConnectHub-Server\_internal" -Recurse -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "^test_|_test\.py$|test_.*\.py$" } | Remove-Item -Force -ErrorAction SilentlyContinue

          # --- 删除 OpenSSL DLL（已用 WinHTTP 替代，不再需要）---
          Write-Host "`nRemoving OpenSSL DLLs from server (replaced by WinHTTP)..."
          foreach ($dll in @("libcrypto-3.dll","libssl-3.dll","libcrypto-3-x64.dll","libssl-3-x64.dll")) {
            $p = "dist\ConnectHub-Server\_internal\$dll"
            if (Test-Path $p) {
              Remove-Item $p -Force
              Write-Host "  Removed $dll"
            }
          }

          Write-Host "`n=== _tcl_data / _tk_data / tcl8 subdir sizes (server) ==="
          Get-ChildItem -Path "dist\ConnectHub-Server\_internal" -Recurse -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "^(tcl|tk|_tcl|_tk)" } | ForEach-Object { $size = (Get-ChildItem -Path $_.FullName -Recurse -File | Measure-Object -Property Length -Sum).Sum; $mb = [math]::Round($size / 1MB, 2); Write-Host "  $($_.FullName.Replace('dist\ConnectHub-Server\_internal\','')): $mb MB" }

          $serverSizeAfter = [math]::Round((Get-ChildItem -Path "dist\ConnectHub-Server" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 2)
          Write-Host "Server folder after cleanup: $serverSizeAfter MB"

      - name: Create portable zips (7z LZMA2 max)
        shell: pwsh
        run: |
          choco install 7zip -y --no-progress
          $7z = "C:\Program Files\7-Zip\7z.exe"
          if (-not (Test-Path $7z)) {
            $7z = Get-ChildItem -Path "C:\" -Filter "7z.exe" -Recurse -ErrorAction SilentlyContinue -Depth 4 | Select-Object -First 1 -ExpandProperty FullName
          }
          Write-Host "Using 7z at: $7z"
          & $7z a -t7z -mx=9 -ms=on "ConnectHub-Client.zip" "dist\ConnectHub-Client\*"
          & $7z a -t7z -mx=9 -ms=on "ConnectHub-Server.zip" "dist\ConnectHub-Server\*"
          $LASTEXITCODE = 0
          $cs = [math]::Round((Get-Item "ConnectHub-Client.zip").Length / 1MB, 2)
          $ss = [math]::Round((Get-Item "ConnectHub-Server.zip").Length / 1MB, 2)
          Write-Host "Client.zip: $cs MB"
          Write-Host "Server.zip: $ss MB"

      - name: Build installer with InnoSetup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = Get-ChildItem -Path "C:\Program Files (x86)\Inno Setup 6","C:\Program Files\Inno Setup 6" -Filter "iscc.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $iscc) {
            Write-Host "iscc not found, searching..."
            $iscc = Get-ChildItem -Path "C:\" -Filter "iscc.exe" -Recurse -ErrorAction SilentlyContinue -Depth 6 | Select-Object -First 1 -ExpandProperty FullName
          }
          Write-Host "Using iscc at: $iscc"
          & $iscc installer\setup.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Host "InnoSetup build FAILED with exit code $LASTEXITCODE"
            exit 1
          }
          if (Test-Path "ConnectHub-Setup.exe") {
            $size = [math]::Round((Get-Item "ConnectHub-Setup.exe").Length / 1MB, 2)
            Write-Host "SUCCESS: ConnectHub-Setup.exe = $size MB"
          } else {
            Write-Host "ERROR: No installer found"
            exit 1
          }

      - name: Create Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          Write-Host "Tag: $tag"
          Write-Host "gh version:"
          gh --version

          # List built files
          Write-Host "`nBuilt files:"
          foreach ($f in @("ConnectHub-Setup.exe","ConnectHub-Client.zip","ConnectHub-Server.zip")) {
            if (Test-Path $f) {
              $size = [math]::Round((Get-Item $f).Length / 1MB, 2)
              Write-Host ("  {0}: {1} MB" -f $f, $size)
            } else {
              Write-Host ("  {0}: NOT FOUND" -f $f)
            }
          }

          # Check if release already exists
          $releaseExists = $false
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            $releaseExists = $true
            Write-Host "`nRelease already exists for $tag"
          } else {
            Write-Host "`nCreating new release for $tag..."
            gh release create $tag --title "ConnectHub $tag" --notes "ConnectHub $tag"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "gh release create failed with exit code $LASTEXITCODE"
              Write-Host "Trying with --generate-notes..."
              gh release create $tag --title "ConnectHub $tag" --generate-notes
              if ($LASTEXITCODE -ne 0) {
                Write-Host "gh release create still failed. Exit."
                exit 1
              }
            }
          }

          # Upload files to the release
          foreach ($f in @("ConnectHub-Setup.exe","ConnectHub-Client.zip","ConnectHub-Server.zip")) {
            if (Test-Path $f) {
              Write-Host "Uploading $f..."
              gh release upload $tag $f --clobber
              if ($LASTEXITCODE -ne 0) {
                Write-Host "  Upload of $f failed (exit $LASTEXITCODE) — continuing"
              }
            }
          }
          Write-Host "`nRelease step complete."
