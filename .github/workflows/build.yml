name: Build ConnectHub Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 websockets pyinstaller

    - name: Build Client (PyInstaller)
      run: pyinstaller --noconfirm --clean client/app.py --name ConnectHub-Client --windowed --add-data "protocol;protocol" --add-data "version.json;." --add-data "client/config.json;." --hidden-import websockets --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui --hidden-import PyQt5.QtWidgets

    - name: Build Server (PyInstaller)
      run: pyinstaller --noconfirm --clean server/main.py --name ConnectHub-Server --console --add-data "protocol;protocol" --add-data "version.json;." --add-data "server/config.json;." --hidden-import websockets

    - name: Create data directory
      run: if not exist dist\ConnectHub-Server\data mkdir dist\ConnectHub-Server\data

    - name: Install NSIS via Chocolatey
      run: choco install nsis -y --no-progress

    - name: Build NSIS installer
      run: |
        $nsisPath = (Get-ChildItem -Path "C:\Program Files (x86)\NSIS","C:\Program Files\NSIS","C:\ProgramData\chocolatey\bin" -Filter "makensis.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
        if (-not $nsisPath) { $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe" }
        Write-Host "Using NSIS at: $nsisPath"
        & $nsisPath installer\installer.nsi

    - name: Check installer
      run: |
        if (Test-Path "ConnectHub-Setup.exe") {
          Write-Host "Installer created successfully"
          Get-Item ConnectHub-Setup.exe | Format-List
        } else {
          Write-Host "Installer NOT found"
          exit 1
        }

    - name: Create Release
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ github.ref_name }}"
        $notes = "ConnectHub " + $tag + "`n`nDownload ConnectHub-Setup.exe and double-click to install."
        gh release create $tag --title ("ConnectHub " + $tag) --notes $notes 'ConnectHub-Setup.exe#ConnectHub Installer'

    - name: Upload additional archives
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        Compress-Archive -Path "dist\ConnectHub-Client\*" -DestinationPath "ConnectHub-Client.zip"
        Compress-Archive -Path "dist\ConnectHub-Server\*" -DestinationPath "ConnectHub-Server.zip"
        gh release upload "${{ github.ref_name }}" "ConnectHub-Client.zip#ConnectHub Client (portable)" "ConnectHub-Server.zip#ConnectHub Server (portable)"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ConnectHub-Setup
        path: ConnectHub-Setup.exe
