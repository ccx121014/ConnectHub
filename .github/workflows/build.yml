name: Build ConnectHub Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps + UPX
        shell: pwsh
        run: |
          pip install --upgrade pip websockets pyinstaller
          $upxUrl = "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip"
          Invoke-WebRequest -Uri $upxUrl -OutFile "$env:TEMP\upx.zip" -UseBasicParsing
          Expand-Archive -Path "$env:TEMP\upx.zip" -DestinationPath "$env:TEMP" -Force
          $upxDir = Get-ChildItem "$env:TEMP" -Directory | Where-Object { $_.Name -like "upx*" } | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "UPX directory: $upxDir"
          echo "UPX_DIR=$upxDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "$upxDir\upx.exe" --version

      - name: Build Client (PyInstaller -OO + ultra-exclude + UPX)
        shell: pwsh
        run: |
          # -OO strips docstrings & asserts from bytecode -> smaller .pyc payload
          python -OO -m PyInstaller --noconfirm --clean `
            --onefile --windowed --strip `
            --upx-dir "$env:UPX_DIR" `
            --paths . --paths client `
            --add-data "protocol;protocol" `
            --add-data "version.json;." `
            --add-data "client/config.json;." `
            --hidden-import websockets --hidden-import websocket_client `
            --hidden-import main_window --hidden-import chat_widget `
            --hidden-import contact_list --hidden-import file_transfer `
            --hidden-import login_dialog --hidden-import updater `
            --hidden-import protocol.messages --hidden-import protocol.signals `
            --hidden-import protocol --hidden-import _tkinter `
            --exclude-module PyQt5 --exclude-module PyQt5.QtCore `
            --exclude-module PyQt5.QtGui --exclude-module PyQt5.QtWidgets `
            --exclude-module PyQt5.QtNetwork `
            --exclude-module PIL --exclude-module Pillow `
            --exclude-module numpy --exclude-module scipy `
            --exclude-module matplotlib --exclude-module pandas `
            --exclude-module unittest --exclude-module test `
            --exclude-module pydoc --exclude-module pydoc_data `
            --exclude-module idlelib --exclude-module lib2to3 `
            --exclude-module distutils --exclude-module setuptools `
            --exclude-module ensurepip --exclude-module tkinter.tix `
            --exclude-module turtledemo --exclude-module turtle `
            --exclude-module sqlite3 --exclude-module bdb `
            --exclude-module audioop --exclude-module wave `
            --exclude-module smtpd --exclude-module poplib `
            --exclude-module imaplib --exclude-module mailbox `
            --exclude-module crypt --exclude-module msilib `
            --exclude-module unicodedata --exclude-module pyexpat `
            --exclude-module xml --exclude-module xml.dom `
            --exclude-module xml.etree --exclude-module xml.parsers `
            --exclude-module xml.sax --exclude-module email `
            --exclude-module http.server --exclude-module http.cookiejar `
            --exclude-module http.cookies `
            --exclude-module ftplib --exclude-module telnetlib `
            --exclude-module nntplib --exclude-module xmlrpc `
            --exclude-module tkinter.scrolledtext --exclude-module tkinter.dnd `
            --exclude-module tkinter.dialog `
            --exclude-module tkinter.colorchooser --exclude-module tkinter.simpledialog `
            --exclude-module csv --exclude-module difflib `
            --exclude-module pprint --exclude-module tabnanny `
            --exclude-module stringprep --exclude-module compileall `
            --exclude-module multiprocessing `
            --exclude-module fractions --exclude-module statistics `
            --exclude-module numbers --exclude-module pdb `
            --exclude-module profile --exclude-module pstats `
            --exclude-module netrc --exclude-module getpass `
            --exclude-module mimetypes --exclude-module plistlib `
            --exclude-module reprlib --exclude-module shlex `
            --exclude-module keyword --exclude-module code `
            --exclude-module codeop --exclude-module textwrap `
            --name ConnectHub-Client `
            client/app.py
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Client build FAILED"
            exit 1
          }
          # Run UPX --ultra-brute on the final onefile exe for max compression
          # (non-fatal: if UPX refuses, keep the PyInstaller-built exe)
          try {
            & "$env:UPX_DIR\upx.exe" --ultra-brute --force "dist\ConnectHub-Client.exe" 2>&1 | Write-Host
          } catch {
            Write-Host "UPX step skipped: $_"
          }
          $size = [math]::Round((Get-Item "dist\ConnectHub-Client.exe").Length / 1MB, 2)
          Write-Host "Client: $size MB"

      - name: Build Server (onefile + UPX)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean `
            --onefile --console --strip `
            --upx-dir "$env:UPX_DIR" `
            --paths . --paths server `
            --add-data "protocol;protocol" `
            --add-data "version.json;." `
            --add-data "server/config.json;." `
            --hidden-import websockets --hidden-import user_manager `
            --hidden-import chat_history --hidden-import webrtc_signaling `
            --hidden-import protocol --hidden-import protocol.messages `
            --exclude-module PyQt5 --exclude-module PyQt5.QtCore `
            --exclude-module PyQt5.QtGui --exclude-module PyQt5.QtWidgets `
            --exclude-module PyQt5.QtNetwork `
            --exclude-module PIL --exclude-module numpy `
            --exclude-module scipy --exclude-module matplotlib `
            --exclude-module pandas --exclude-module unittest `
            --exclude-module test --exclude-module pydoc `
            --exclude-module idlelib --exclude-module lib2to3 `
            --exclude-module distutils --exclude-module setuptools `
            --exclude-module unicodedata --exclude-module pyexpat `
            --exclude-module xml --exclude-module email `
            --name ConnectHub-Server `
            server/main.py
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Server build FAILED"
            exit 1
          }
          $size = [math]::Round((Get-Item "dist\ConnectHub-Server.exe").Length / 1MB, 2)
          Write-Host "Server: $size MB"

      - name: Build installer with InnoSetup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = Get-ChildItem -Path "C:\Program Files (x86)\Inno Setup 6","C:\Program Files\Inno Setup 6" -Filter "iscc.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $iscc) {
            Write-Host "iscc not found, searching..."
            $iscc = Get-ChildItem -Path "C:\" -Filter "iscc.exe" -Recurse -ErrorAction SilentlyContinue -Depth 6 | Select-Object -First 1 -ExpandProperty FullName
          }
          Write-Host "Using iscc at: $iscc"
          & $iscc installer\setup.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Host "InnoSetup build FAILED with exit code $LASTEXITCODE"
            exit 1
          }
          if (Test-Path "ConnectHub-Setup.exe") {
            $size = [math]::Round((Get-Item "ConnectHub-Setup.exe").Length / 1MB, 2)
            Write-Host "SUCCESS: ConnectHub-Setup.exe = $size MB"
          } else {
            Write-Host "ERROR: No installer found"
            exit 1
          }

      - name: Create Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $fileArgs = @()
          if (Test-Path "dist\ConnectHub-Client.exe") {
            $size = [math]::Round((Get-Item "dist\ConnectHub-Client.exe").Length / 1MB, 2)
            Write-Host "  ConnectHub-Client.exe: $size MB"
            $fileArgs += "dist\ConnectHub-Client.exe"
          }
          if (Test-Path "dist\ConnectHub-Server.exe") {
            $size = [math]::Round((Get-Item "dist\ConnectHub-Server.exe").Length / 1MB, 2)
            Write-Host "  ConnectHub-Server.exe: $size MB"
            $fileArgs += "dist\ConnectHub-Server.exe"
          }
          if (Test-Path "ConnectHub-Setup.exe") {
            $size = [math]::Round((Get-Item "ConnectHub-Setup.exe").Length / 1MB, 2)
            Write-Host "  ConnectHub-Setup.exe: $size MB"
            $fileArgs += "ConnectHub-Setup.exe"
          }
          & gh release create $tag @fileArgs --title "ConnectHub $tag" --notes "ConnectHub $tag"
          Write-Host "Release created, exit code: $LASTEXITCODE"
