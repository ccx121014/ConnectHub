name: Build ConnectHub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 websockets pyinstaller

    - name: Build Client
      run: |
        cd "${{ github.workspace }}"
        pyinstaller --noconfirm --clean "client/app.py" ^
          --name "ConnectHub-Client" ^
          --windowed ^
          --add-data "protocol;protocol" ^
          --add-data "version.json;." ^
          --add-data "client/config.json;." ^
          --hidden-import websockets ^
          --hidden-import PyQt5.QtCore ^
          --hidden-import PyQt5.QtGui ^
          --hidden-import PyQt5.QtWidgets
      shell: cmd

    - name: Build Server
      run: |
        cd "${{ github.workspace }}"
        pyinstaller --noconfirm --clean "server/main.py" ^
          --name "ConnectHub-Server" ^
          --console ^
          --add-data "protocol;protocol" ^
          --add-data "version.json;." ^
          --add-data "server/config.json;." ^
          --hidden-import websockets
      shell: cmd

    - name: Create data directory
      run: mkdir -p "dist/ConnectHub-Server/data"

    - name: Zip Client
      run: Compress-Archive -Path "dist/ConnectHub-Client/*" -DestinationPath "ConnectHub-Client.zip"

    - name: Zip Server
      run: Compress-Archive -Path "dist/ConnectHub-Server/*" -DestinationPath "ConnectHub-Server.zip"

    - name: Create Release
      run: |
        gh release create "${{ github.ref_name }}" \
          --title "ConnectHub ${{ github.ref_name }}" \
          --notes "ConnectHub ${{ github.ref_name }}" \
          --draft=false \
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to Release
      run: |
        gh release upload "${{ github.ref_name }}" \
          "ConnectHub-Client.zip" \
          "ConnectHub-Server.zip"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
